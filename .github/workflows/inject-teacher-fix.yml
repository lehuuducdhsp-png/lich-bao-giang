name: Inject teacher reader fix

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/inject-teacher-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add teacher fix script
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          tag = '<script src="teacher-fix.js?v=20260718.2"></script>'
          if tag not in text:
              text = text.replace('</body>', tag + '\n</body>')
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No change needed"
          else
            git commit -m "fix: load teacher reader patch [skip ci]"
            git push
          fi
